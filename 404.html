<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Lokesh R</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .error-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: linear-gradient(135deg, var(--primary-color) 0%, #81a1c1 100%);
            color: white;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 800;
            margin-bottom: 0;
            line-height: 1;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="container">
            <h1 class="error-code">404</h1>
            <h2 class="mb-4">Oops! This model couldn't find that path.</h2>
            <p class="lead mb-5">The page you're looking for doesn't exist or has been moved.</p>
            <a href="index.html" class="btn btn-light btn-lg px-5">Back to Home</a>
        </div>
    </div>
</body>
</html>
